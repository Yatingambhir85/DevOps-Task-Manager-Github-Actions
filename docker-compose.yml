services:
  # Database Service
  db:
    image: mysql:latest
    container_name: task-manager-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: $${{secrets.DB_PASSWORD}}
      MYSQL_DATABASE: $${{vars.DB_NAME}}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    # --- HEALTHCHECK SECTION ---
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${{secrets.DB_PASSWORD}}"]
      interval: 10s     # How often to check
      timeout: 5s      # How long to wait for a response
      retries: 5       # How many times to try before marking as unhealthy
      start_period: 30s # Give MySQL time to initialize the data directory
    networks:
      - tasks-network

  # App Service
  app:
    image: ${{vars.DOCKERHUB_USERNAME}}/task-manager-application:latest
    container_name: task-manager-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=${{vars.DB_HOST}}
      - DB_USER=${{vars.DB_USER}}
      - DB_PASSWORD=${{secrets.DB_PASSWORD}}
      - DB_NAME=${{vars.DB_NAME}}
      - PORT=${{vars.PORT}}
    # --- CONDITIONALLY START ---
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tasks-network

volumes:
  db_data:

networks:
  tasks-network:
    driver: bridge
