name: Code Linting Workflow

on:
  workflow_call: 

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ "20", "22", "24" ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # This ensures we have the full history to push back
          fetch-depth: 0 
      - name: Setup nodejs ${{ matrix.node-version }}
        uses: actions/setup-node@v4 # Note: setup-node@v4 is the current stable version
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm' # Good practice to speed up runs
      - name: install dependencies
        run: npm ci # 'npm ci' is faster and more reliable in CI than 'npm i'

      - name: Run Linter
        run: npx eslint "backend/*.js" "frontend/*.js"
      # We only run the Audit Fix on ONE version in the matrix to avoid conflicts
      - name: Run Dependencies Check & Fix 
        run: |
          npm audit fix
