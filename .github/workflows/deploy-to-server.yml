name: Deployment to server

on: 
  workflow_dispatch:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: SSH into the cloud server, install the packages and create a directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
                 echo "Installing required packages & folders."
                 sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
                 sudo usermod -aG docker $USER
                 mkdir -p devops
                 
      - name: Check version of Docker Compose
        run: |
           docker --version
           docker compose version
                     
      - name: Copy the docker-compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/devops

      - name: Run the container
        run: |
          docker compose down && docker compose up -d --build --force-recreate --pull always
          # Give the app 10 seconds to actually start the internal server
          sleep 10
          docker ps
          docker logs task-manager-app
          sleep 20
        env:
          DB_PASSWORD: ${{secrets.DB_PASSWORD}}
          DB_NAME: ${{vars.DB_NAME}}
          DOCKERHUB_USERNAME: ${{vars.DOCKERHUB_USERNAME}}
          DB_HOST: ${{vars.DB_HOST}}
          PORT: ${{vars.PORT}}
          DB_USER: ${{vars.DB_USER}}
