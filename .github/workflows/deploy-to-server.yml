name: Deployment to server

on: 
  workflow_dispatch:
  workflow_call:

jobs:
  check_runner_status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      runner_status: ${{steps.check.outputs.status}}
    steps:
      - name: Check Runner Status
        id: check
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
        run: |
          # Fetch the full JSON response first
          RESPONSE=$(gh api repos/${{ github.repository }}/actions/runners)
          # Extract the status and print it to the console
          # We use head -n 1 in case you have multiple runners with the same label
          RAW_STATUS=$(echo "$RESPONSE" | jq -r '.runners[]? | select(.labels[].name=="self-hosted") | .status' | head -n 1)
          # If STATUS is empty, default it to offline
          FINAL_STATUS=${RAW_STATUS:-not_found}
          echo "----------------------------------------"
          echo "🔍 Runner Detection: $FINAL_STATUS"
          echo "----------------------------------------"
          if [ "$FINAL_STATUS" == "online" ]; then
            echo "status=online" >> $GITHUB_OUTPUT
          else
            echo "status=offline" >> $GITHUB_OUTPUT
          fi
  deploy-self-hosted:
    needs: check_runner_status
    if: needs.check_runner_status.outputs.runner_status == 'online'
    runs-on: self-hosted
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: SSH into the cloud server, install the packages and create a directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
                 echo "Installing required packages & folders."
                 sudo apt-get update && sudo apt-get install docker.io 
                 sudo apt-get install docker-compose-v2 -y
                 sudo usermod -aG docker $USER
                 mkdir -p devops                    
      - name: Copy the docker-compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/devops

      - name: SSH to server and run the app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD, DB_NAME, DOCKERHUB_USERNAME, DB_HOST, PORT, DB_USER
          script: |
            cd devops/
            sudo -E docker compose down || true
            sudo -E docker compose up -d --build --force-recreate --pull always
            # Give the app 10 seconds to actually start the internal server
            echo "Waiting for health checks..."
            timeout 60s bash -c 'until curl -s localhost:3000 > /dev/null; do sleep 2; done'
            sudo docker ps
            sudo docker logs task-manager-app --tail 20
        env:
            DB_PASSWORD: ${{secrets.DB_PASSWORD}}
            DB_NAME: ${{vars.DB_NAME}}
            DOCKERHUB_USERNAME: ${{vars.DOCKERHUB_USERNAME}}
            DB_HOST: ${{vars.DB_HOST}}
            PORT: ${{vars.PORT}}
            DB_USER: ${{vars.DB_USER}}
      - name: SSH to the server and cleanup resources
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_SSH_HOST}}
          username: ${{secrets.EC2_SSH_USER}}
          key: ${{secrets.EC2_SSH_PRIVATE_KEY}}
          script: |
            echo "Cleaning up unused Docker resources to save disk space..."
            # Removes all stopped containers, unused networks, and dangling images
            sudo docker system prune -f
            # Specifically remove images that are no longer tagged (from previous 'pulls')
            sudo docker image prune -a -f --filter "until=24h"
  deploy_on_github-managed:
      runs-on: ubuntu-latest
      needs: [check_runner_status, deploy-self-hosted]
      if: always()
      steps:
        - name: checkout code
          uses: actions/checkout@v4
        - name: check version of Docker and Docker Compose
          run: |
            docker --version
            docker compose version
        - name: Run the container
          run: |
            docker compose down && docker compose up -d --build --force-recreate --pull always
            # Give the app 10 seconds to actually start the internal server
            echo "Waiting for health checks..."
            sleep 10
            docker ps
            docker logs task-manager-app --tail 20
          env:
              DB_PASSWORD: ${{secrets.DB_PASSWORD}}
              DB_NAME: ${{vars.DB_NAME}}
              DOCKERHUB_USERNAME: ${{vars.DOCKERHUB_USERNAME}}
              DB_HOST: ${{vars.DB_HOST}}
              PORT: ${{vars.PORT}}
              DB_USER: ${{vars.DB_USER}}
        - name: Install cloudeflared
          uses: AnimMouse/setup-cloudflared@v2
        - name: Start Tunnel & Capture URL
          id: cloudflare_tunnel
          run: |
            cloudflared tunnel --url http://localhost:3000 > tunnel.log 2>&1 &
            echo "Waiting for Cloudflare URL..."
            timeout 60s bash -c 'until grep -o "https://[^ ]*\.trycloudflare\.com" tunnel.log; do sleep 2; done' > url.txt
            TUNNEL_URL=$(cat url.txt)
            echo "url=$TUNNEL_URL" >> $GITHUB_OUTPUT
            echo "Waiting for Cloudflare Edge to route traffic (Health Check)..."
            # This loop pings the PUBLIC URL until it stops giving 404/502 errors
            timeout 60s bash -c "until curl -s -o /dev/null -w \"%{http_code}\" $TUNNEL_URL | grep -qE '2[0-9]{2}|3[0-9]{2}'; do 
            echo 'Tunnel not ready yet, retrying...'; 
            sleep 5; 
            done"
            echo "Connection established!"
            echo "Your app is live at: $TUNNEL_URL"
        - name: Use the Public URL for testing
          run: |
            echo "Your app is live at: ${{ steps.cloudflare_tunnel.outputs.url }}"
        - name: Keep the runner active
          run: sleep 120 # Increase this as per your need

            
        
