name: Deployment to server

on: 
  workflow_dispatch:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: SSH into the cloud server, install the packages and create a directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
                 echo "Installing required packages & folders."
                 sudo apt-get update && sudo apt-get install docker.io 
                 sudo apt-get install docker-compose-v2 -y
                 sudo usermod -aG docker $USER
                 mkdir -p devops                    
      - name: Copy the docker-compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/devops

      - name: SSH to server and run the app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD, DB_NAME, DOCKERHUB_USERNAME, DB_HOST, PORT, DB_USER
          script: |
            cd devops/
            sudo docker compose down || true
            sudo docker compose up -d --build --force-recreate --pull always
            # Give the app 10 seconds to actually start the internal server
            sleep 10
            sudo docker ps
            sudo docker logs task-manager-app
            sleep 20
        env:
            DB_PASSWORD: ${{secrets.DB_PASSWORD}}
            DB_NAME: ${{vars.DB_NAME}}
            DOCKERHUB_USERNAME: ${{vars.DOCKERHUB_USERNAME}}
            DB_HOST: ${{vars.DB_HOST}}
            PORT: ${{vars.PORT}}
            DB_USER: ${{vars.DB_USER}}
