name: Deployment to server

on: 
  workflow_dispatch:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Check version of Docker Compose
        run: |
           docker --version
           docker compose version
      - name: Run the container
        run: |
          docker compose down && docker compose up -d --build --force-recreate --pull always
        env:
          DB_PASSWORD: ${{secrets.DB_PASSWORD}}
          DB_NAME: ${{vars.DB_NAME}}
          DOCKERHUB_USERNAME: ${{vars.DOCKERHUB_USERNAME}}
          DB_HOST: ${{vars.DB_HOST}}
          PORT: ${{vars.PORT}}
          DB_USER: ${{vars.DB_USER}}
      - name: Install cloudflared
        uses: AnimMouse/setup-cloudflared@v2
      - name: Start Tunnel and Capture URL
        id: cloudflare_tunnel
        run: |
          # 1. Start the tunnel and pipe output to a file
          cloudflared tunnel --url http://localhost:3000 > tunnel.log 2>&1 &
          
          # 2. Wait for the URL to appear in the log (up to 30 seconds)
          echo "Waiting for Cloudflare URL..."
          timeout 30s bash -c 'until grep -o "https://.*\.trycloudflare\.com" tunnel.log; do sleep 1; done' > url.txt
          
          # 3. Clean up the URL and save it to GitHub Outputs
          TUNNEL_URL=$(cat url.txt)
          echo "url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "Your app is live at: $TUNNEL_URL"
      - name: Use the Public URL
        run: |
          # Now this will work because we set it manually in the previous step
          echo "Your app is live at: ${{ steps.cloudflare_tunnel.outputs.url }}"
      - name: Keep the runner active
        run: sleep 1800
 
