name: Deployment to server

on: 
  workflow_dispatch:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: SSH into the cloud server, install the packages and create a directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
                 echo "Installing required packages & folders."
                 sudo apt-get update && sudo apt-get install docker.io 
                 sudo apt-get install docker-compose-v2 -y
                 sudo usermod -aG docker $USER
                 mkdir -p devops                    
      - name: Copy the docker-compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/devops

      - name: SSH to server and run the app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD, DB_NAME, DOCKERHUB_USERNAME, DB_HOST, PORT, DB_USER
          script: |
            cd devops/
            sudo -E docker compose down || true
            sudo -E docker compose up -d --build --force-recreate --pull always
            # Give the app 10 seconds to actually start the internal server
            sleep 10
            sudo docker ps
            sudo docker logs task-manager-app
            sleep 20
        env:
            DB_PASSWORD: ${{secrets.DB_PASSWORD}}
            DB_NAME: ${{vars.DB_NAME}}
            DOCKERHUB_USERNAME: ${{vars.DOCKERHUB_USERNAME}}
            DB_HOST: ${{vars.DB_HOST}}
            PORT: ${{vars.PORT}}
            DB_USER: ${{vars.DB_USER}}
  deploy_on_github-managed:
      runs-on: ubuntu-latest
      needs: deploy
      if: always()
      steps:
        - name: checkout code
          uses: actions/checkout@v4
        - name: check version of docker and docker compose
          run: |
            docker --version
            docker compose version
        - name: Run the container
          run: |
            docker compose down && docker compose up -d --build --force-recreate --pull always
            # Give the app 10 seconds to actually start the internal server
            sleep 10
            docker ps
            docker logs task-manager-app
            sleep 20
          env:
              DB_PASSWORD: ${{secrets.DB_PASSWORD}}
              DB_NAME: ${{vars.DB_NAME}}
              DOCKERHUB_USERNAME: ${{vars.DOCKERHUB_USERNAME}}
              DB_HOST: ${{vars.DB_HOST}}
              PORT: ${{vars.PORT}}
              DB_USER: ${{vars.DB_USER}}
        - name: Install cloudeflared
          uses: AnimMouse/setup-cloudflared@v2
        - name: Start Tunnel & Capture URL
          id: cloudflare_tunnel
          run: |
            cloudflared tunnel --url http://localhost:3000 > tunnel.log 2>&1 &
            echo "Waiting for Cloudflare URL..."
            timeout 30s bash -c 'until grep -o "https://.*\.trycloudflare\.com" tunnel.log; do sleep 1; done' > url.txt
            TUNNEL_URL=$(cat url.txt)
            echo "url=$TUNNEL_URL" >> $GITHUB_OUTPUT
            echo "Your app is live at: $TUNNEL_URL"
        - name: Use the Public URL for testing
          run: |
            echo "Your app is live at: ${{ steps.cloudflare_tunnel.outputs.url }}"
        - name: Keep the runner active
          run: sleep 120 # Increase this as per your need

            
        
